# PostgreSQL Configuration for POB System with ZKTeco ADMS
# Optimized for concurrent biometric device connections

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 200                    # High for ZKTeco concurrent devices
superuser_reserved_connections = 3

# Memory Settings
shared_buffers = 256MB                   # 25% of RAM for ZKTeco data
effective_cache_size = 1GB               # 75% of RAM for caching
maintenance_work_mem = 64MB              # For index maintenance
checkpoint_completion_target = 0.9        # Smoother checkpoints
wal_buffers = 16MB                       # WAL buffer size
work_mem = 4MB                          # Per operation memory
hash_mem_multiplier = 1.0

# WAL Settings
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_timeout = 15min
archive_mode = off
archive_command = ''

# Query Planning
random_page_cost = 1.1                   # SSD optimization
effective_io_concurrency = 200            # Concurrent I/O for ZKTeco devices
seq_page_cost = 1.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# Autovacuum Settings
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = -1

# Logging Settings
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_messages = warning
log_min_error_statement = error
log_connections = on
log_disconnections = on
log_duration = on
log_statement = 'ddl'
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# ZKTeco ADMS Specific Optimizations
timezone = 'UTC'
default_text_search_config = 'pg_catalog.english'
dynamic_shared_memory_type = posix
huge_pages = try

# Client Connection Settings
client_min_messages = warning
search_path = '"$user", public'
default_tablespace = ''
temp_tablespaces = ''
default_toast_compression = 'pglz'
escape_string_warning = off
sql_inheritance = on
standard_conforming_strings = on
synchronize_seqscans = on
transform_null_equals = off
exit_on_error = off
row_security = on
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
default_transaction_deferrable = off
session_replication_role = 'origin'
statement_timeout = 0
lock_timeout = 0
idle_in_transaction_session_timeout = 0
vacuum_freeze_min_age = 50000000
vacuum_freeze_table_age = 150000000
vacuum_multixact_freeze_min_age = 5000000
vacuum_multixact_freeze_table_age = 150000000
vacuum_cleanup_index_scale_factor = 0.1
bytea_output = 'hex'
xmlbinary = 'base64'
xmloption = 'content'
gin_fuzzy_search_limit = 0
gin_pending_list_limit = 4MB
effective_cache_size = 1GB
effective_io_concurrency = 200
