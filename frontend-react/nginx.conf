server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Allow larger file uploads (personnel photos, documents)
    client_max_body_size 20M;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # React was built with homepage=/pob-system — strip that prefix before
    # looking up files so /pob-system/static/js/main.js → /static/js/main.js.
    # ^~ prevents the regex ~* location below from stealing these requests.
    location ^~ /pob-system/ {
        rewrite ^/pob-system/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket upgrade for /api/* paths — must appear BEFORE the generic /api/ block
    location ~ ^/api/.*/(events|ws)/?$ {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Uploaded files (personnel photos, QR codes, documents)
    # ^~ prevents the static-file regex below from intercepting .jpg/.png etc.
    location ^~ /uploads/ {
        proxy_pass http://pob_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ^~ /media/ {
        proxy_pass http://pob_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        expires 7d;
    }

    # API proxy to backend
    # CORS is handled by FastAPI's CORSMiddleware — do NOT add CORS headers here,
    # as nginx add_header overwrites the backend's scoped Allow-Origin header with '*'.
    location /api/ {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Rewrite redirect Location headers to use the same host:port the browser
        # used (e.g. localhost:3000).  Without this, FastAPI's trailing-slash 307
        # redirects point to the bare backend hostname, which is cross-origin from
        # the browser's perspective — causing it to strip the Authorization header
        # and receive a 401 that triggers an unexpected logout.
        proxy_redirect http://pob_backend:8000 $scheme://$http_host;
    }

    # WebSocket proxy for real-time updates (/ws/* paths)
    location /ws/ {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ADMS ZKTeco device protocol endpoints (no auth, device-initiated)
    location /iclock/ {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # ZKTeco devices use HTTP keep-alive; give them plenty of time to
        # complete a heartbeat cycle before nginx closes the upstream connection.
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        keepalive_timeout 120s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
