groups:
  - name: pob_system
    rules:

      # Backend down
      - alert: BackendDown
        expr: up{job="pob-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "POB Backend is DOWN"
          description: "The FastAPI backend has been unreachable for more than 1 minute."

      # PostgreSQL down
      - alert: PostgreSQLDown
        expr: up{job="postgresql"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is DOWN"
          description: "The database has been unreachable for more than 1 minute. All data operations are failing."

      # Redis down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is DOWN"
          description: "Redis cache is down. WebSockets and Celery tasks are affected."

      # High API error rate
      - alert: HighAPIErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "More than 10% of API requests are returning 5xx errors."

      # High API response time
      - alert: SlowAPIResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API responses"
          description: "95th percentile response time is above 2 seconds."

      # PostgreSQL too many connections
      - alert: PostgreSQLTooManyConnections
        expr: pg_stat_activity_count > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection count high"
          description: "PostgreSQL has {{ $value }} active connections (limit: 300)."

      # Disk space on backup volume
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Server disk is {{ $value | printf \"%.0f\" }}% full."
