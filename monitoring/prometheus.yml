global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    system: 'pob-system'
    environment: 'production'

scrape_configs:

  # FastAPI backend — exposes /metrics via prometheus-fastapi-instrumentator
  - job_name: 'pob-backend'
    static_configs:
      - targets: ['pob_backend:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  # PostgreSQL metrics via postgres_exporter
  - job_name: 'postgresql'
    static_configs:
      - targets: ['pob_postgres_exporter:9187']
    scrape_interval: 30s

  # Redis metrics via redis_exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['pob_redis_exporter:9121']
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Alert rules — fires when critical thresholds are crossed
rule_files:
  - /etc/prometheus/alerts.yml
