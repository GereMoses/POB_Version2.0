version: '3.8'

# ─── Production Docker Compose ────────────────────────────────────────────────
# Architecture:
#   - Central server at HQ runs all services
#   - Remote locations (offshore platforms, branches) have ZKTeco readers only
#   - Readers push attendance data via ADMS to HQ server (port 80 → /iclock/)
#   - Users access the system via HTTPS (port 443)
#
# Usage:
#   First deploy:  ./scripts/deploy.sh
#   Update:        ./scripts/deploy.sh update
#
# ZKTeco ADMS device configuration:
#   Server address: http://<HQ_SERVER_IP>   (port 80, HTTP — many readers don't support HTTPS)
#   The nginx config passes /iclock/ on port 80 directly to the backend
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: pob_postgres
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_min_duration_statement=1000
      -c log_connections=on
      -c log_disconnections=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pob_internal
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pob_redis
    command: redis-server /etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pob_internal
    restart: unless-stopped

  # ── DB Init (runs once on first deploy, then exits) ─────────────────────────
  db-init:
    image: postgres:15-alpine
    container_name: pob_db_init
    env_file: .env.prod
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ./docker/db-init.sh:/db-init.sh:ro
      - ./database/init/complete_database_setup.sql:/migrations/complete_database_setup.sql:ro
      - ./database/init/fix_zones_final.sql:/migrations/fix_zones_final.sql:ro
    entrypoint: ["/bin/bash", "/db-init.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pob_internal
    restart: "no"

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pob_backend:latest
    container_name: pob_backend
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=production
      - BACKUP_DIR=/backups
    volumes:
      - uploads_data:/app/uploads
      - media_data:/app/media
      - logs_data:/app/logs
      - ${BACKUP_DIR:-db_backups}:/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pob_internal
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    image: pob_celery:latest
    container_name: pob_celery_worker
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - uploads_data:/app/uploads
      - media_data:/app/media
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pob_internal
    restart: unless-stopped

  # ── Celery Beat (periodic task scheduler) ──────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    image: pob_celery:latest
    container_name: pob_celery_beat
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      - REDIS_URL=redis://redis:6379/0
    command: ["celery", "-A", "celery_worker.app", "beat", "--loglevel=info", "--schedule=/app/celerybeat-schedule"]
    volumes:
      - celerybeat_data:/app
      - logs_data:/app/logs
    depends_on:
      - redis
      - celery-worker
    networks:
      - pob_internal
    restart: unless-stopped

  # ── Frontend (nginx + built React) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    image: pob_frontend:latest
    container_name: pob_frontend
    volumes:
      - uploads_data:/usr/share/nginx/uploads:ro
      - media_data:/usr/share/nginx/media:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pob_internal
    restart: unless-stopped

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  # Port 80:  ZKTeco ADMS push (/iclock/) + HTTP→HTTPS redirect for browsers
  # Port 443: HTTPS for all users (frontend + API + WebSocket)
  nginx:
    image: nginx:alpine
    container_name: pob_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - uploads_data:/var/www/uploads:ro
      - media_data:/var/www/media:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - pob_internal
      - pob_external
    restart: unless-stopped

  # ── Automated Database Backup ───────────────────────────────────────────────
  # Runs pg_dump daily at 02:00. Keeps 7 daily + 4 weekly + 3 monthly backups.
  #
  # NAS storage: set BACKUP_DIR in .env.prod to your NAS mount point, e.g.:
  #   BACKUP_DIR=/mnt/nas-backups
  # The volume below uses that path as a bind mount so backups go directly to NAS.
  # If BACKUP_DIR is not set, backups land in the local db_backups Docker volume.
  db-backup:
    image: postgres:15-alpine
    container_name: pob_db_backup
    env_file: .env.prod
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      PGPASSWORD: ${DATABASE_PASSWORD}
      BACKUP_RETAIN_DAYS: "7"
      BACKUP_RETAIN_WEEKS: "4"
      BACKUP_RETAIN_MONTHS: "3"
    volumes:
      - ${BACKUP_DIR:-db_backups}:/backups
      - ./docker/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c", "echo '0 2 * * * /bin/sh /backup.sh >> /backups/backup.log 2>&1' | crontab - && crond -f -d 8"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pob_internal
    restart: unless-stopped

  # ── Backend also needs access to backup dir (for UI-triggered backups) ──────
  # The backend's /api/v1/backup endpoints write to BACKUP_DIR via pg_dump subprocess.

  # ── Prometheus (metrics collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: pob_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - pob_internal
    restart: unless-stopped

  # ── Grafana (monitoring dashboards) ────────────────────────────────────────
  # Access at: https://your-domain.com/monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: pob_grafana
    env_file: .env.prod
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/monitoring
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - pob_internal
    restart: unless-stopped

  # ── PostgreSQL Exporter ─────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pob_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - pob_internal
    restart: unless-stopped

  # ── Redis Exporter ──────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: pob_redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - pob_internal
    restart: unless-stopped

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  media_data:
    driver: local
  logs_data:
    driver: local
  celerybeat_data:
    driver: local
  nginx_logs:
    driver: local
  db_backups:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  pob_internal:
    name: pob_internal
    driver: bridge
    internal: true
  pob_external:
    name: pob_external
    driver: bridge
