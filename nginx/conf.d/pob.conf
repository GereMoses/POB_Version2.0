# POB System — Production Nginx Configuration
#
# Traffic model:
#   Port 80  → ZKTeco ADMS device push (/iclock/) — stays HTTP (devices can't do HTTPS)
#              Everything else on port 80 → redirect to HTTPS
#   Port 443 → All users: React frontend, REST API, WebSocket streams
#              /monitoring → Grafana dashboard (admin only)
#
# Remote location readers are configured with:
#   ADMS Server: http://<HQ_IP_OR_DOMAIN>     (port 80)

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=5r/s;
limit_req_zone $binary_remote_addr zone=adms_limit:10m   rate=60r/s;

# WebSocket upgrade map: "upgrade" during a WS handshake, "close" otherwise.
# Required so /api/* and /ws/* WebSocket paths upgrade correctly (not just the
# ones ending in /ws or /events).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP server ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS and resolve upstreams via a variable so nginx
    # RE-RESOLVES the backend's container IP (it changes when the container is
    # recreated). Without this nginx caches the IP at startup and returns 502
    # after a `docker compose up -d --force-recreate backend`.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $pob_backend pob_backend;

    # ── ZKTeco ADMS push endpoint (stays HTTP — many readers don't support HTTPS)
    # Readers at remote locations push to: http://HQ_SERVER/iclock/cdata
    location /iclock/ {
        proxy_pass http://$pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 30s;

        # Rate limit: allow burst of 120 (shift change spike), then 60r/s
        limit_req zone=adms_limit burst=120 nodelay;
        limit_req_status 429;
    }

    # ── Health probe (for load balancers and uptime monitors) ────────────────
    location = /health {
        proxy_pass http://$pob_backend:8000;
        access_log off;
    }

    # ── Everything else → HTTPS ───────────────────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # Re-resolve upstream container IPs via Docker DNS (see note in :80 server) so
    # recreating backend/frontend never leaves nginx pointing at a stale IP (502).
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $pob_backend pob_backend;
    set $pob_frontend pob_frontend;

    # SSL — replace with your organisation's certificate
    # For Let's Encrypt: certbot certonly --standalone -d your-domain.com
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    client_max_body_size 50M;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Static file uploads (personnel photos, floor plans, documents) ───────
    location /uploads/ {
        alias   /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    location /media/ {
        alias   /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── WebSocket endpoints (must come BEFORE the generic /api/ block) ────────
    location ~ ^/(api|ws)/.*/(ws|events)/?$ {
        proxy_pass         http://$pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Auth endpoints (stricter rate limiting) ───────────────────────────────
    location ~ ^/api/v1/auth/(login|token|production-login|simple-login) {
        proxy_pass         http://$pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     http:// https://;
        limit_req          zone=auth_limit burst=10 nodelay;
        limit_req_status   429;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://$pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       $connection_upgrade;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Rewrite any http:// redirect Location (e.g. FastAPI trailing-slash 307)
        # to https:// so the browser doesn't block it as mixed content.
        proxy_redirect     http:// https://;
        proxy_read_timeout 120s;
        limit_req          zone=api_limit burst=50 nodelay;
        limit_req_status   429;
    }

    # ── Device-module API under /iclock/ (terminals, time-drift, pending-devices)
    # These are admin API calls (NOT reader pushes); route straight to the backend
    # over HTTPS so they don't depend on the frontend container's proxy.
    location /iclock/ {
        proxy_pass         http://$pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     http:// https://;
        proxy_read_timeout 120s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://$pob_backend:8000;
        access_log off;
    }

    # ── Grafana monitoring dashboard (/monitoring → Grafana) ─────────────────
    # Restricted to RFC-1918 private ranges (LAN / VPN only).
    # If you need remote access, add specific public IPs before the deny all.
    location /monitoring/ {
        # Allow only internal/VPN networks — block all external access
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny  all;

        proxy_pass         http://pob_grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket live feeds under /ws/ (mustering, notifications, etc.) ───────
    location /ws/ {
        proxy_pass         http://$pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       $connection_upgrade;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── React Frontend ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://$pob_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Cache built JS/CSS/image assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass         http://$pob_frontend:80;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }
}
