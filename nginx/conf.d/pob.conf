# POB System — production nginx virtual host
# Handles: React frontend, FastAPI backend, ADMS ZKTeco device push, file serving

# HTTP → HTTPS redirect (comment out if not using TLS)
server {
    listen 80;
    server_name _;

    # Allow ZKTeco ADMS devices on HTTP (many can't do HTTPS)
    location /iclock/ {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Health check passthrough (useful for load balancer probes)
    location /health {
        proxy_pass http://pob_backend:8000;
    }

    # Everything else: redirect to HTTPS
    # Comment out this block if you are NOT using TLS yet
    location / {
        return 301 https://$host$request_uri;
    }

    # If NOT using TLS, replace the block above with:
    # include /etc/nginx/conf.d/pob-http-locations.conf;
}

# HTTPS main server
# Comment out entire block if not using TLS — move the location blocks into the HTTP server above
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── Static file uploads (personnel photos, floor plans, documents) ──────
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── WebSocket endpoints — must come before generic /api/ block ──────────
    location ~ ^/api/.*/(events|ws)/?$ {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── ADMS ZKTeco device push endpoint ────────────────────────────────────
    location /iclock/ {
        proxy_pass http://pob_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://pob_backend:8000;
    }

    # ── React frontend (served from the frontend container) ──────────────────
    location / {
        proxy_pass http://pob_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets from the frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://pob_frontend:80;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
