version: '3.8'

services:
  # PostgreSQL Database - Optimized for ZKTeco ADMS concurrent connections
  postgres:
    image: postgres:15-alpine
    container_name: pob_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pob_system}
      POSTGRES_USER: ${POSTGRES_USER:-pob_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pob_password}
      # PostgreSQL performance tuning for ZKTeco ADMS
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # Connection limits for high-concurrency ZKTeco devices
      POSTGRES_MAX_CONNECTIONS: "200"
      POSTGRES_SHARED_BUFFERS: "256MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "1GB"
      POSTGRES_MAINTENANCE_WORK_MEM: "64MB"
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: "0.9"
      POSTGRES_WAL_BUFFERS: "16MB"
      POSTGRES_DEFAULT_STATISTICS_TARGET: "100"
    # Expose to localhost only so the backend (host-network mode) can connect via 127.0.0.1
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # PostgreSQL configuration for ZKTeco ADMS
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pob_user -d pob_system -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pob_redis
    # Expose to localhost only so the backend (host-network mode) can connect via 127.0.0.1
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    # Require password auth when REDIS_PASSWORD is set; fall back to no-auth for local dev
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
               redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes;
             else
               redis-server --appendonly yes;
             fi"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: >
        sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
                 redis-cli -a \"$$REDIS_PASSWORD\" ping;
               else
                 redis-cli ping;
               fi"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  #
  # network_mode: host — the backend runs on the host's network stack so it can
  # see every real LAN interface.  This is what makes ZKTeco auto-discovery work
  # regardless of which network the server is plugged into; moving to a new site
  # is automatically detected without any config change.
  #
  # NOTE: host networking is supported on Linux only.  On macOS / Windows Docker
  # Desktop the daemon silently falls back to bridge networking; set the
  # DEVICE_SCAN_SUBNETS env var (e.g. 192.168.1.0/24) for dev on those platforms.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pob_backend
    # NOTE for production (Linux): switch to network_mode: host so the backend can
    # see every real LAN interface for ZKTeco auto-discovery, and change the DB/Redis
    # URLs below to 127.0.0.1 (postgres/redis publish to localhost in that mode).
    # On macOS Docker Desktop, network_mode: host puts the container on the Linux VM's
    # network stack, not the macOS host's — so bridge mode + explicit ports is used here.
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      # Mount source code for hot reload (dev only — production uses baked image)
      - ./backend:/app
      - /app/__pycache__  # Exclude pycache
      - /app/.pytest_cache  # Exclude pytest cache
      # Persistent upload/media dirs so file uploads survive container restarts in dev
      - uploads_dev:/app/uploads
      - media_dev:/app/media
      - logs_dev:/app/logs
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pob_user}:${POSTGRES_PASSWORD:-pob_password}@postgres:5432/${POSTGRES_DB:-pob_system}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_HOST=redis
      - SECRET_KEY=${SECRET_KEY:-pob-system-production-secret-key-2024-secure-jwt-auth}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=False
      - LOG_LEVEL=INFO
      # Optional extra subnets to scan — leave empty for fully automatic detection.
      # Set this only if you need to scan an additional range the server is not on.
      # Example: DEVICE_SCAN_SUBNETS=10.10.5.0/24,172.16.0.0/24
      - DEVICE_SCAN_SUBNETS=${DEVICE_SCAN_SUBNETS:-}
      # ── Email notifications (emergency + mustering alerts) ──────────────────
      # Fill these in .env to turn on email alerts, then restart the backend.
      # Gmail example: SMTP_HOST=smtp.gmail.com, SMTP_PORT=587, SMTP_USER=you@gmail.com,
      # SMTP_PASSWORD=<16-char App Password>, EMAIL_FROM=you@gmail.com. Empty = off.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      # SMS + WhatsApp (optional). Provider picked by SMS_PROVIDER:
      #   termii (NG — one account does SMS + WhatsApp), twilio, africastalking, generic.
      - SMS_PROVIDER=${SMS_PROVIDER:-}
      - SMS_API_KEY=${SMS_API_KEY:-}
      - SMS_SENDER_ID=${SMS_SENDER_ID:-}
      - SMS_CHANNEL=${SMS_CHANNEL:-generic}
      - SMS_DEFAULT_COUNTRY_CODE=${SMS_DEFAULT_COUNTRY_CODE:-234}
      - TERMII_BASE_URL=${TERMII_BASE_URL:-https://api.ng.termii.com}
      # WhatsApp: defaults to SMS_PROVIDER when that is termii; override if separate.
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-}
      - WHATSAPP_SENDER_ID=${WHATSAPP_SENDER_ID:-}
      # Generic HTTP gateway (only if SMS_PROVIDER=generic):
      - SMS_API_URL=${SMS_API_URL:-}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-}
      # Twilio (only if SMS_PROVIDER=twilio):
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - SMS_FROM_NUMBER=${SMS_FROM_NUMBER:-}
      - WHATSAPP_FROM=${WHATSAPP_FROM:-}
      # Africa's Talking (only if SMS_PROVIDER=africastalking):
      - AT_USERNAME=${AT_USERNAME:-}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4", "--timeout-graceful-shutdown", "30", "--access-log"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "--max-time", "5", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Celery Worker — handles report export, visitor notifications, MTD tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: pob_celery_worker
    volumes:
      # Hot reload: source changes apply immediately (worker auto-restarts via watchdog)
      - ./backend:/app
      - /app/__pycache__
      - uploads_dev:/app/uploads
      - media_dev:/app/media
      - logs_dev:/app/logs
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pob_user}:${POSTGRES_PASSWORD:-pob_password}@postgres:5432/${POSTGRES_DB:-pob_system}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_HOST=redis
      - SECRET_KEY=${SECRET_KEY:-pob-system-production-secret-key-2024-secure-jwt-auth}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=False
      # Email/SMS for scheduled-drill notifications (same .env vars as the backend)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      # SMS + WhatsApp (same vars as backend — see backend service for docs)
      - SMS_PROVIDER=${SMS_PROVIDER:-}
      - SMS_API_KEY=${SMS_API_KEY:-}
      - SMS_SENDER_ID=${SMS_SENDER_ID:-}
      - SMS_CHANNEL=${SMS_CHANNEL:-generic}
      - SMS_DEFAULT_COUNTRY_CODE=${SMS_DEFAULT_COUNTRY_CODE:-234}
      - TERMII_BASE_URL=${TERMII_BASE_URL:-https://api.ng.termii.com}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-}
      - WHATSAPP_SENDER_ID=${WHATSAPP_SENDER_ID:-}
      - SMS_API_URL=${SMS_API_URL:-}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - SMS_FROM_NUMBER=${SMS_FROM_NUMBER:-}
      - WHATSAPP_FROM=${WHATSAPP_FROM:-}
      - AT_USERNAME=${AT_USERNAME:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_worker.app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # React Frontend (Production) - Nginx served with production backend
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: pob_frontend
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      # Mount built files for updates
      - ./frontend-react/build:/usr/share/nginx/html:ro
      # Mount nginx config so changes take effect without rebuilding the image
      - ./frontend-react/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - REACT_APP_API_BASE_URL=http://pob_backend:8000/api/v1
    depends_on:
      - backend
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # React Frontend (Development - Hot Reload)
  frontend-dev:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile.dev
    container_name: pob_frontend_dev
    ports:
      - "3001:3000"
    volumes:
      # Mount source code for hot reload
      - ./frontend-react:/app
      - /app/node_modules  # Exclude node_modules to avoid conflicts
      - /app/dist  # Exclude build output
    environment:
      - BACKEND_URL=http://pob_backend:8000
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=3001
      - WDS_SOCKET_HOST=localhost
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - NODE_OPTIONS=--max-old-space-size=4096
      - GENERATE_SOURCEMAP=false
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # Enable stdin for interactive debugging
    stdin_open: true
    # Keep container running
    tty: true
    profiles:
      - development

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_dev:
    driver: local
  media_dev:
    driver: local
  logs_dev:
    driver: local

networks:
  default:
    name: pob_network
