# Redis configuration for POB System production
# Enables both RDB snapshots and AOF for durability

# Persistence — RDB snapshots
save 900 1
save 300 10
save 60 10000

# AOF — append-only file for durability (survives hard crash)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory limit (adjust to your server RAM)
maxmemory 512mb
maxmemory-policy allkeys-lru

# Bind to all interfaces inside the container
bind 0.0.0.0

# Disable protected mode (safe inside Docker network)
protected-mode no

# Log level
loglevel notice
