version: '3.8'

services:
  # PostgreSQL Database - Optimized for ZKTeco ADMS concurrent connections
  postgres:
    image: postgres:15-alpine
    container_name: pob_postgres
    environment:
      POSTGRES_DB: pob_system
      POSTGRES_USER: pob_user
      POSTGRES_PASSWORD: pob_password
      # PostgreSQL performance tuning for ZKTeco ADMS
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # Connection limits for high-concurrency ZKTeco devices
      POSTGRES_MAX_CONNECTIONS: "200"
      POSTGRES_SHARED_BUFFERS: "256MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "1GB"
      POSTGRES_MAINTENANCE_WORK_MEM: "64MB"
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: "0.9"
      POSTGRES_WAL_BUFFERS: "16MB"
      POSTGRES_DEFAULT_STATISTICS_TARGET: "100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # PostgreSQL configuration for ZKTeco ADMS
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pob_user -d pob_system -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pob_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pob_backend
    ports:
      - "8001:8001"
    volumes:
      # Mount source code for hot reload
      - ./backend:/app
      - /app/__pycache__  # Exclude pycache
      - /app/.pytest_cache  # Exclude pytest cache
    environment:
      - DATABASE_URL=postgresql://pob_user:pob_password@postgres:5432/pob_system
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # Enable stdin for interactive debugging
    stdin_open: true
    # Keep container running
    tty: true

  # React Frontend (Production)
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: pob_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend-react/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  # Vue.js Frontend (Development - Legacy)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pob_frontend_dev
    ports:
      - "3001:3000"
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      - /app/node_modules  # Exclude node_modules to avoid conflicts
      - /app/dist  # Exclude build output
    environment:
      - VITE_API_BASE_URL=http://localhost:8001/api/v1
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    # Enable stdin for interactive debugging
    stdin_open: true
    # Keep container running
    tty: true
    profiles:
      - development

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: pob_network
